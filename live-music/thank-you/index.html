<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Monamor — Thank You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --dk-bg: #3B2D30; --dk-brd: #5E4E51;
      --dk-head: #EBE4E0; --dk-body: #A89994; --dk-accent: #C08E8E;
      --f-d: 'Optima', Georgia, serif; --f-b: 'DM Sans', sans-serif;
    }
    body {
      font-family: var(--f-b); font-weight: 300;
      background: var(--dk-bg); color: var(--dk-head);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 40px; text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    .logo { height: 52px; width: auto; margin: 0 auto 48px; display: block; }
    .lbl { font-family: var(--f-d); font-size: 0.6rem; letter-spacing: 0.26em; text-transform: uppercase; color: var(--dk-accent); opacity: 0.7; display: block; margin-bottom: 14px; }
    h1 { font-family: var(--f-d); font-weight: 300; font-size: clamp(2rem, 5vw, 3rem); color: var(--dk-head); line-height: 1.1; margin-bottom: 16px; }
    h1 em { font-style: italic; color: var(--dk-accent); }
    .rule { width: 40px; height: 1px; background: var(--dk-accent); opacity: 0.3; margin: 20px auto 24px; }
    p { font-size: 0.92rem; color: var(--dk-body); max-width: 400px; line-height: 1.7; margin-bottom: 40px; }
    .btn {
      font-family: var(--f-d); display: inline-block; padding: 13px 32px;
      font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
      text-decoration: none; transition: background .2s, color .2s;
      background: #FFFFFF; color: var(--dk-bg); border: 1px solid #FFFFFF;
    }
    .btn:hover { background: var(--dk-accent); border-color: var(--dk-accent); color: var(--dk-head); }
  </style>
</head>
