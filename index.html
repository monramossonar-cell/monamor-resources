<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monamor — Resources</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--dk-bg:#3B2D30;--dk-head:#EBE4E0;--dk-accent:#C08E8E;--dk-brd:#5E4E51;--f-d:'Optima',Georgia,serif;--f-b:'DM Sans',sans-serif;}
    body{background:var(--dk-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:var(--f-b);font-weight:300;padding:48px;}
    .brand{font-family:var(--f-d);font-size:0.62rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--dk-accent);opacity:0.7;display:block;margin-bottom:24px;text-align:center;}
    h1{font-family:var(--f-d);font-weight:300;font-size:clamp(2rem,5vw,3.5rem);color:var(--dk-head);line-height:1.1;text-align:center;margin-bottom:14px;}
    h1 em{font-style:italic;color:var(--dk-accent);}
    .rule{width:40px;height:1px;background:var(--dk-accent);opacity:0.3;margin:20px auto 40px;}
    .links{display:flex;flex-direction:column;gap:0;width:100%;max-width:400px;}
    a{display:flex;justify-content:space-between;align-items:baseline;padding:16px 0;border-bottom:1px solid var(--dk-brd);font-family:var(--f-d);font-size:0.82rem;color:var(--dk-head);text-decoration:none;opacity:0.7;transition:opacity 0.2s;}
    a:hover{opacity:1;color:var(--dk-accent);}
    .arrow{color:var(--dk-accent);opacity:0.5;}
  </style>
</head>
<body>
  <span class="brand">Monamor · Resources</span>
  <h1>Music for <em>Every Occasion.</em></h1>
  <div class="rule"></div>
  <div class="links">
    <a href="/live-music/">Live Music & Private Events <span class="arrow">→</span></a>
    <a href="/weddings/">Weddings <span class="arrow">→</span></a>
  </div>
</body>
</html>
